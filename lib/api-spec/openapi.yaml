openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Multi-Tenant Workflow Automation Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: tenants
    description: Tenant / Organization management
  - name: users
    description: User management
  - name: workflows
    description: Workflow CRUD
  - name: executions
    description: Workflow execution logs
  - name: dashboard
    description: Dashboard summary stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user and create/join a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # ── Tenants ──────────────────────────────────────────────────────────────────
  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants (SUPER_ADMIN only)
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"

  /tenants/{tenantId}:
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Get a specific tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          description: Not found
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update tenant details (ORG_ADMIN)
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdate"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  # ── Users ────────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users in the current tenant
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: inviteUser
      tags: [users]
      summary: Invite a user to the tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteUserInput"
      responses:
        "201":
          description: Invited user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user's role or status
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Remove user from tenant
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Workflows ────────────────────────────────────────────────────────────────
  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      summary: List workflows in the current tenant
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, all]
      responses:
        "200":
          description: List of workflows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workflow"
    post:
      operationId: createWorkflow
      tags: [workflows]
      summary: Create a new workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowInput"
      responses:
        "201":
          description: Created workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /workflows/{workflowId}:
    get:
      operationId: getWorkflow
      tags: [workflows]
      summary: Get a workflow by ID
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
        "404":
          description: Not found
    patch:
      operationId: updateWorkflow
      tags: [workflows]
      summary: Update a workflow definition
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowUpdate"
      responses:
        "200":
          description: Updated workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
    delete:
      operationId: deleteWorkflow
      tags: [workflows]
      summary: Delete a workflow
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workflows/{workflowId}/toggle:
    post:
      operationId: toggleWorkflow
      tags: [workflows]
      summary: Toggle workflow active/inactive
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /workflows/{workflowId}/execute:
    post:
      operationId: executeWorkflow
      tags: [workflows]
      summary: Manually trigger a workflow execution
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"

  # ── Executions ───────────────────────────────────────────────────────────────
  /executions:
    get:
      operationId: listExecutions
      tags: [executions]
      summary: List execution logs for the tenant
      parameters:
        - name: workflowId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failure, running, all]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Execution logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Execution"

  /executions/{executionId}:
    get:
      operationId: getExecution
      tags: [executions]
      summary: Get a specific execution log
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Execution log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"
        "404":
          description: Not found

  /executions/{executionId}/retry:
    post:
      operationId: retryExecution
      tags: [executions]
      summary: Retry a failed execution
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Retry started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"

  # ── Dashboard ────────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Aggregate stats for the tenant dashboard
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent workflow executions (activity feed)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Execution"

  /dashboard/execution-trend:
    get:
      operationId: getExecutionTrend
      tags: [dashboard]
      summary: Daily execution counts for the last 14 days
      responses:
        "200":
          description: Execution trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Auth schemas ────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [name, email, password, organizationName]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        organizationName:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ── Tenant ──────────────────────────────────────────────────────────────────
    Tenant:
      type: object
      required: [id, name, slug, plan, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
          enum: [free, pro, enterprise]
        userCount:
          type: ["integer", "null"]
        workflowCount:
          type: ["integer", "null"]
        createdAt:
          type: string

    TenantUpdate:
      type: object
      properties:
        name:
          type: string
        plan:
          type: string
          enum: [free, pro, enterprise]

    # ── User ────────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, name, email, role, tenantId, active, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [SUPER_ADMIN, ORG_ADMIN, USER]
        tenantId:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string

    InviteUserInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [ORG_ADMIN, USER]

    UserUpdate:
      type: object
      properties:
        role:
          type: string
          enum: [ORG_ADMIN, USER]
        active:
          type: boolean

    # ── Workflow ────────────────────────────────────────────────────────────────
    WorkflowNode:
      type: object
      required: [id, type, label, config]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [trigger, condition, action]
        label:
          type: string
        config:
          type: object

    WorkflowEdge:
      type: object
      required: [id, source, target]
      properties:
        id:
          type: string
        source:
          type: string
        target:
          type: string
        label:
          type: ["string", "null"]

    Workflow:
      type: object
      required: [id, tenantId, name, description, status, nodes, edges, triggerType, createdAt, updatedAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, inactive]
        triggerType:
          type: string
          enum: [manual, user_registered, api_event, scheduled]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowEdge"
        executionCount:
          type: ["integer", "null"]
        lastExecutedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    WorkflowInput:
      type: object
      required: [name, triggerType, nodes, edges]
      properties:
        name:
          type: string
        description:
          type: string
        triggerType:
          type: string
          enum: [manual, user_registered, api_event, scheduled]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowEdge"

    WorkflowUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        triggerType:
          type: string
          enum: [manual, user_registered, api_event, scheduled]
        status:
          type: string
          enum: [active, inactive]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowEdge"

    # ── Execution ───────────────────────────────────────────────────────────────
    Execution:
      type: object
      required: [id, workflowId, tenantId, status, startedAt]
      properties:
        id:
          type: integer
        workflowId:
          type: integer
        workflowName:
          type: ["string", "null"]
        tenantId:
          type: integer
        status:
          type: string
          enum: [success, failure, running]
        logs:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        durationMs:
          type: ["integer", "null"]
        startedAt:
          type: string
        completedAt:
          type: ["string", "null"]

    # ── Dashboard ───────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalWorkflows, activeWorkflows, totalExecutions, successRate, totalUsers, recentFailures]
      properties:
        totalWorkflows:
          type: integer
        activeWorkflows:
          type: integer
        totalExecutions:
          type: integer
        successRate:
          type: number
        totalUsers:
          type: integer
        recentFailures:
          type: integer

    TrendPoint:
      type: object
      required: [date, count, successCount, failureCount]
      properties:
        date:
          type: string
        count:
          type: integer
        successCount:
          type: integer
        failureCount:
          type: integer
