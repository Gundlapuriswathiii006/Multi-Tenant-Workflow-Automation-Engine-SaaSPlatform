kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "mvn -f pom.xml spring-boot:run"

[services.production]

[services.production.build]
args = ["mvn", "-f", "pom.xml", "package", "-DskipTests"]

[services.production.run]
args = ["java", "-jar", "target/api-server-0.0.1-SNAPSHOT.jar"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
